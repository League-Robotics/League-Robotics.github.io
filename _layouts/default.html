<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% if page.blurb %}<meta name="description" content="{{ page.blurb | escape }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Subsystems</a>
      <a href="{{ '/publishing/' | relative_url }}">Publish your docs</a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      League Robotics documentation hub ·
      <a href="https://github.com/League-Robotics/League-Robotics.github.io">source</a> ·
      docs are pulled from each subsystem repo's <code>docs/wiki/</code>.
    </p>
  </footer>
</body>
</html>
