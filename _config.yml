title: League Robotics Docs
description: Documentation hub for the League Robotics subsystem repositories.
url: "https://league-robotics.github.io"
baseurl: ""

# Generated by scripts/collect.py at build time; safe to keep listed even when absent.
# Source/tooling dirs that must never be treated as site content:
exclude:
  - examples/
  - scripts/
  - docs/
  - config/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - subsystems.yml
  - .collect-tmp/

# We generate plain .md files with explicit layouts in front matter, so no plugins
# are required. Keep this minimal for a fast, dependency-light Pages build.
plugins: []

# Don't let Kramdown choke on subsystem docs that use GitHub-flavored fences.
markdown: kramdown
kramdown:
  input: GFM
