name: Build & deploy docs hub

# The hub pulls every subsystem in subsystems.yml and rebuilds itself. It runs:
#   - when a subsystem pings us (repository_dispatch: docs-updated)
#   - manually (workflow_dispatch)
#   - when the hub itself changes (push to the default branch)
on:
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Mint a short-lived installation token (read access to org repos) from the
      # org-wide GitHub App, so collect.py can clone private subsystem repos.
      # Omit this step + the env below if every subsystem repo is public.
      - name: Get app token (read org repos)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DOCS_HUB_APP_ID }}
          private-key: ${{ secrets.DOCS_HUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install collector deps
        run: pip install -r scripts/requirements.txt

      - name: Collect subsystem docs
        env:
          DOCS_PULL_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python scripts/collect.py

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
